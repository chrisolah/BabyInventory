<style>
  body { background: #EDECE5; margin: 0; padding: 0; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #2C2C2A; }
  .container { max-width: 580px; margin: 24px auto; background: #FFF; border-radius: 12px; overflow: hidden; }
  .head { padding: 22px 28px 4px; }
  .wordmark { font-family: 'Fraunces', Georgia, serif; font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
  .h1 { font-family: 'Fraunces', Georgia, serif; font-size: 26px; font-weight: 500; line-height: 1.2; margin: 14px 28px 0; color: #2C2C2A; }
  .h1 em { font-style: italic; color: #1D9E75; }
  .body { padding: 0 28px; margin-top: 16px; color: #5F5E5A; font-size: 15px; line-height: 1.65; }
  .body p { margin: 0 0 12px; }
  .code-wrap { padding: 22px 28px 4px; }
  .code { display: inline-block; background: #F5F4ED; color: #085041; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 30px; letter-spacing: 0.18em; font-weight: 600; padding: 16px 26px; border-radius: 10px; }
  .footer { padding: 22px 28px 24px; border-top: 1px solid #F1EFE8; margin-top: 18px; font-size: 12px; color: #888780; line-height: 1.55; }
</style>
<div class="container" style="max-width:580px; margin:24px auto; background:#FFF; border-radius:12px; overflow:hidden; font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#2C2C2A;">
  <div class="head" style="padding:22px 28px 4px;">
    <span class="wordmark" style="font-family:'Fraunces',Georgia,serif; font-size:20px; font-weight:500;">sprigloop</span>
  </div>
  <h1 class="h1" style="font-family:'Fraunces',Georgia,serif; font-size:26px; font-weight:500; line-height:1.2; margin:14px 28px 0; color:#2C2C2A;">Reset your <em style="font-style:italic; color:#1D9E75;">password</em>.</h1>
  <div class="body" style="padding:0 28px; margin-top:16px; color:#5F5E5A; font-size:15px; line-height:1.65;">
    <p style="margin:0 0 12px;">Enter this code in Sprigloop to set a new password. It expires in one hour.</p>
  </div>
  <div class="code-wrap" style="padding:22px 28px 4px;">
    <span class="code" style="display:inline-block; background:#F5F4ED; color:#085041; font-family:'SF Mono',Menlo,Consolas,monospace; font-size:30px; letter-spacing:0.18em; font-weight:600; padding:16px 26px; border-radius:10px;">{{ .Token }}</span>
  </div>
  <div class="body" style="padding:0 28px; margin-top:14px; color:#5F5E5A; font-size:15px; line-height:1.65;">
    <p style="margin:0 0 12px;">If you didn't ask for this, ignore this email. Your password won't change unless you use the code.</p>
  </div>
  <div class="footer" style="padding:22px 28px 24px; border-top:1px solid #F1EFE8; margin-top:18px; font-size:12px; color:#888780; line-height:1.55;">
    Sprigloop &middot; Detroit, MI
  </div>
</div>
