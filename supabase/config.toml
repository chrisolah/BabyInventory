# Supabase CLI config. Only the bits we actually use are set here; everything
# else falls back to the CLI defaults. Full reference:
# https://supabase.com/docs/guides/cli/config

# ── Edge function overrides ─────────────────────────────────────────────────
# scan-clothing-tag does its own JWT validation inside the function (it calls
# userClient.auth.getUser() to resolve the caller before bumping the rate
# limit). We disable gateway-level JWT verification here to work around a
# Supabase platform bug where the edge-function gateway rejects valid ES256
# tokens issued by the new asymmetric signing keys while the Auth API accepts
# them. See:
#   https://github.com/supabase/supabase/issues/42244
#   https://github.com/supabase/supabase/issues/42810
#
# Safe because the function still enforces auth itself — an anonymous request
# gets a 401 with `{"error":"invalid_jwt"}` before any Anthropic call runs.
# Remove this override once Supabase ships a fix for the gateway.
[functions.scan-clothing-tag]
verify_jwt = false

# ── Auth email templates ────────────────────────────────────────────────────
# Brand-styled HTML for the five Supabase auth emails. Pushed to remote
# projects via `supabase config push --project-ref <ref>`. Source HTML lives
# in supabase/templates/. Subject lines are versioned here so they ship with
# the templates rather than getting set in the dashboard out-of-band.
#
# SMTP itself is configured via the dashboard for now (sender address,
# Resend API key). If we ever want SMTP also config-driven, add a
# [auth.email.smtp] block with `pass = "env(SUPABASE_SMTP_PASS)"`.
#
# After editing any template file or subject, push to both projects:
#   supabase config push --project-ref adojihtjkfhozwbxfjae    (beta)
#   supabase config push --project-ref udtgpgqniieedlxxglvf    (prod)

[auth.email.template.confirmation]
subject = "Confirm your Sprigloop account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.magic_link]
subject = "Your Sprigloop sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.recovery]
subject = "Reset your Sprigloop password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your new email"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.invite]
subject = "You're invited to Sprigloop"
content_path = "./supabase/templates/invite.html"
